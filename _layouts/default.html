<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>
    {% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}
  </title>
  {% if page.description %}
  <meta name="description" content="{{ page.description }}" />
  {% elsif site.description %}
  <meta name="description" content="{{ site.description }}" />
  {% endif %}

  <link rel="stylesheet" href="{{ '/css/base.css' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/css/components.css' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/css/layout.css' | relative_url }}" />
</head>
<body>
  {% include header.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}
  <script src="{{ '/assets/js/navigation.js' | relative_url }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>
    {% if title %}{{ title }} | {% endif %}No ICE in Schools
  </title>
  {% if description %}
  <meta name="description" content="{{ description }}" />
  {% else %}
  <meta name="description" content="Advocacy resources for keeping schools safe from ICE" />
  {% endif %}

  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32.png' | url }}" />
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon-16.png' | url }}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/apple-touch-icon.png' | url }}" />

  <link rel="stylesheet" href="{{ '/css/base.css' | url }}" />
  <link rel="stylesheet" href="{{ '/css/components.css' | url }}" />
  <link rel="stylesheet" href="{{ '/css/layout.css' | url }}" />
</head>
<body>
  {% include "header.html" %}

  <main>
    {{ content | safe }}
  </main>

  {% include "footer.html" %}
  <script src="{{ '/assets/js/navigation.js' | url }}"></script>
</body>
</html>

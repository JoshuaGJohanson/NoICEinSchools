---
layout: default
title: Volunteer Sign Up
description: Sign up to volunteer for the No ICE in Schools campaign.
permalink: /volunteer-signup.html
---

<section class="section">
  <div class="container">
    <div class="section-header">
      <h1>Sign Up to Volunteer</h1>
      <p>Tell us how you'd like to contribute and we'll be in touch with next steps.</p>
    </div>

    <div style="max-width: 600px; margin: 0 auto;">
      <form action="https://formspree.io/f/xdawdoan" method="POST" class="contact-form">
        <div class="form-group">
          <label for="name">Full Name *</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            placeholder="Your full name"
          />
        </div>

        <div class="form-group">
          <label for="email">Email Address *</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="your.email@example.com"
          />
        </div>

        <div class="form-group">
          <label for="role">How would you like to help? *</label>
          <select id="role" name="role" required>
            <option value="" disabled selected>Select a volunteer role</option>
            <option value="Campaign supporter">Campaign supporter</option>
            <option value="District leader">District leader</option>
            <option value="Research and writing">Research and writing</option>
            <option value="Graphic design">Graphic design</option>
            <option value="Social media and communications">Social media and communications</option>
            <option value="Web support">Web support</option>
            <option value="Other">Other (please specify below)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="state">State <span style="font-weight:400; color:var(--muted);">(optional)</span></label>
          <select id="state" name="state">
            <option value="">— Select your state —</option>
            <option>Alabama</option><option>Alaska</option><option>Arizona</option>
            <option>Arkansas</option><option>California</option><option>Colorado</option>
            <option>Connecticut</option><option>Delaware</option><option>Florida</option>
            <option>Georgia</option><option>Hawaii</option><option>Idaho</option>
            <option>Illinois</option><option>Indiana</option><option>Iowa</option>
            <option>Kansas</option><option>Kentucky</option><option>Louisiana</option>
            <option>Maine</option><option>Maryland</option><option>Massachusetts</option>
            <option>Michigan</option><option>Minnesota</option><option>Mississippi</option>
            <option>Missouri</option><option>Montana</option><option>Nebraska</option>
            <option>Nevada</option><option>New Hampshire</option><option>New Jersey</option>
            <option>New Mexico</option><option>New York</option><option>North Carolina</option>
            <option>North Dakota</option><option>Ohio</option><option>Oklahoma</option>
            <option>Oregon</option><option>Pennsylvania</option><option>Rhode Island</option>
            <option>South Carolina</option><option>South Dakota</option><option>Tennessee</option>
            <option>Texas</option><option>Utah</option><option>Vermont</option>
            <option>Virginia</option><option>Washington</option><option>West Virginia</option>
            <option>Wisconsin</option><option>Wyoming</option>
          </select>
        </div>

        <div class="form-group">
          <label for="district">School district <span style="font-weight:400; color:var(--muted);">(optional)</span></label>
          <input type="text" id="district" name="district" placeholder="e.g. Los Angeles Unified School District" autocomplete="off" list="district-suggestions" />
          <datalist id="district-suggestions"></datalist>
        </div>

        <div class="form-group">
          <label for="city">City <span style="font-weight:400; color:var(--muted);">(optional — if school district is unknown)</span></label>
          <input type="text" id="city" name="city" placeholder="e.g. Los Angeles" autocomplete="address-level2" />
        </div>

        <div class="form-group">
          <label for="message">Anything else you'd like us to know?</label>
          <textarea
            id="message"
            name="message"
            rows="5"
            placeholder="Tell us about your background, availability, or anything that would help us get you started..."
          ></textarea>
        </div>

        <div class="form-group">
          <button type="submit" class="button button-primary">Sign Up</button>
        </div>

        <p style="font-size: 0.9rem; color: var(--muted); margin-top: 1rem;">
          * Required fields
        </p>
      </form>
    </div>
  </div>
</section>

<script src="{{ '/assets/js/districts-by-state.js' | url }}"></script>
<script src="{{ '/assets/js/subscription-form.js' | url }}"></script>
<script>
(function () {
  initSubscriptionForm({
    stateSelect:   document.getElementById('state'),
    districtInput: document.getElementById('district'),
    datalist:      document.getElementById('district-suggestions'),
    activityNote:  { textContent: '', classList: { add: function(){}, remove: function(){} } },
  });
})();
</script>
